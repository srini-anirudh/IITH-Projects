<section name="department">
  <div fxLayout fxLayoutAlign="center center">
    <mat-form-field fxFlex="40%">
      <input matInput type="text" (keyup)="doFilter($event)" placeholder="Filter">
    </mat-form-field>
      <button mat-icon-button mat-raised-button (click)="openDialog('Add',{})" matTooltip="Click to Add" class="iconbutton" color="primary">
        <mat-icon aria-label="Add">add</mat-icon>
      </button>
  </div>
<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 department-table">
    <!-- Position Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> No. </th>
      <td mat-cell *matCellDef="let department"> {{department.id}} </td>
    </ng-container>
  
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
      <td mat-cell *matCellDef="let department"> {{department.name}} </td>
    </ng-container>
  
    <!-- Code Column -->
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Code </th>
      <td mat-cell *matCellDef="let department"> {{department.code}} </td>
    </ng-container>

    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef> Action </th>   
      <td mat-cell *matCellDef="let department"> 
        <button mat-icon-button mat-raised-button (click)="openDialog('Update', department)" matTooltip="Click to Edit" class="iconbutton" color="accent">
          <mat-icon aria-label="Edit">edit</mat-icon>
        </button>
        <!-- <button mat-icon-button mat-raised-button (click)="openDialog('Delete', department)" matTooltip="Click to Delete" class="iconbutton" color="warn">
          <mat-icon aria-label="Delete">delete</mat-icon>
        </button>  -->
      </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  <mat-paginator showFirstLastButtons [length]="1" [pageSize]="5" [pageSizeOptions]="[5, 10, 20, 50, 100]"></mat-paginator>
</section>
